<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cursos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        #brand {
            color: #000;
        }

        .nav-link {
            color: #000 !important;
        }

        .nav-link:hover {
            color: #08ffbd !important;
        }
    </style>

</head>

<body>

    <header>
        <nav class="navbar navbar-expand-lg bg-success text-white border-botton navbar-dark">
            <div class="container">
                <a class="navbar-brand fw-bold" id="brand" href="./admin.html">
                    <i class="bi bi-mortarboard"></i>
                    Sistema Academico
                </a>

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="menu">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item"><a class="nav-link">Home</a></li>
                        <li class="nav-item"><a class="nav-link">Cursos</a></li>
                        <li class="nav-item"><a class="nav-link">Professores</a></li>
                        <li class="nav-item"><a class="nav-link">Sair</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main class="container py-4">
        <div class="card shadow">
            <div class="card-header bg-secondary text-white">
                <h1 class="h4 mb-0">
                    <i class="bi bi-journal-bookmark-fill"></i>
                    Cadastro de Professor
                </h1>
            </div>

            <div class="card-body">
                <form id="formProfessor">

                    <div class="mb-3">
                        <label for="nomeProfessor" class="form-label"> Nome do Professor </label>
                        <input type="text" class="form-control" id="nomeProfessor">
                        <div class="invalid-feedback"> Ruim </div>
                        <div class="valid-feedback"> Certo </div>
                    <div class="mb-3">
                        <label for="registro" class="form-label"> Registro </label>
                        <input type="text" class="form-control" id="registro">
                        <div class="invalid-feedback"> Ruim </div>
                        <div class="valid-feedback"> Certo </div>
                    </div>

                    <div class="mb-3">
                        <label for="funcao" class="form-label"> Função/Aula </label>
                        <input type="number" class="form-control" id="funcao">
                         <div class="invalid-feedback"> Ruim </div>
                        <div class="valid-feedback"> Certo </div>
                    </div>

                    <button type="submit" class="btn btn-success">
                        <i class="bi bi-save"></i>
                        Salvar
                    </button>
                </form>
            </div>
        </div>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script-professor.js"></script>
</body>

</html>
